kind: sources
name: alloydb_main
type: alloydb-postgres
project: ${ALLOYDB_PROJECT}
region: ${ALLOYDB_REGION}
cluster: ${ALLOYDB_CLUSTER}
instance: ${ALLOYDB_INSTANCE}
database: ${ALLOYDB_DATABASE}
user: ${ALLOYDB_USER}
password: ${ALLOYDB_PASSWORD}
ipType: private
---
kind: tools
name: alloydb_list_tables
type: postgres-list-tables
source: alloydb_main
description: Lists tables in AlloyDB PostgreSQL.
---
kind: tools
name: alloydb_recent_orders
type: postgres-sql
source: alloydb_main
description: Read-only query for recent orders.
readOnly: true
statement: |
  SELECT id, created_at, status, total_amount
  FROM public.orders
  ORDER BY created_at DESC
  LIMIT $1;
parameters:
  - name: limit_count
    type: integer
    description: Number of rows to return.
---
kind: toolsets
name: alloydb_postgres_readonly
tools:
  - alloydb_list_tables
  - alloydb_recent_orders
