server {
    listen 8080;
    server_name _;

    # Serve static UI files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the ADK backend (eliminates CORS)
    location /api/ {
        proxy_pass https://ayra-sales-assistant-664984131730.us-central1.run.app/;
        proxy_ssl_server_name on;
        proxy_set_header Host ayra-sales-assistant-664984131730.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (for streaming responses)
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
    }
}
